  - changeSet:
      id: orders-create-sync-trigger-doc-to-columns-202604101344
      author: Stephen Atwell
      comment: Create trigger to sync doc JSON column to individual columns on INSERT/UPDATE
      labels: myticket-123
      runInTransaction: true
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION sync_doc_to_columns()
              RETURNS TRIGGER AS $$
              BEGIN
                  IF NEW.doc IS NOT NULL THEN
                      NEW.main := NEW.doc::json->>'Main';
                      NEW.drink := NEW.doc::json->>'Drink';
                      NEW.email := NEW.doc::json->>'Email';
                      NEW.side1 := NEW.doc::json->>'Side1';
                      NEW.side2 := NEW.doc::json->>'Side2';
                      NEW.orderid := (NEW.doc::json->>'OrderId')::BIGINT;
                      NEW.orderdate := (NEW.doc::json->>'OrderDate')::TIMESTAMP;
                      NEW.orderstatus := NEW.doc::json->>'OrderStatus';
                  END IF;
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE TRIGGER trg_sync_doc_to_columns
              BEFORE INSERT OR UPDATE OF doc ON orders
              FOR EACH ROW
              EXECUTE FUNCTION sync_doc_to_columns();
      rollback:
        - sql:
            splitStatements: false
            sql: |
              DROP TRIGGER IF EXISTS trg_sync_doc_to_columns ON orders;
              DROP FUNCTION IF EXISTS sync_doc_to_columns();
  - changeSet:
      id: orders-create-sync-trigger-columns-to-doc-202604101344
      author: Stephen Atwell
      comment: Create trigger to sync individual columns back to doc JSON column on INSERT/UPDATE
      labels: myticket-123
      runInTransaction: true
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION sync_columns_to_doc()
              RETURNS TRIGGER AS $$
              BEGIN
                  IF TG_OP = 'UPDATE' AND (
                      OLD.main IS DISTINCT FROM NEW.main OR
                      OLD.drink IS DISTINCT FROM NEW.drink OR
                      OLD.email IS DISTINCT FROM NEW.email OR
                      OLD.side1 IS DISTINCT FROM NEW.side1 OR
                      OLD.side2 IS DISTINCT FROM NEW.side2 OR
                      OLD.orderid IS DISTINCT FROM NEW.orderid OR
                      OLD.orderdate IS DISTINCT FROM NEW.orderdate OR
                      OLD.orderstatus IS DISTINCT FROM NEW.orderstatus
                  ) THEN
                      NEW.doc := json_build_object(
                          'Main', NEW.main,
                          'Drink', NEW.drink,
                          'Email', NEW.email,
                          'Side1', NEW.side1,
                          'Side2', NEW.side2,
                          'OrderId', NEW.orderid,
                          'OrderDate', NEW.orderdate,
                          'OrderStatus', NEW.orderstatus
                      )::text;
                  END IF;
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE TRIGGER trg_sync_columns_to_doc
              BEFORE UPDATE OF main, drink, email, side1, side2, orderid, orderdate, orderstatus ON orders
              FOR EACH ROW
              EXECUTE FUNCTION sync_columns_to_doc();
      rollback:
        - sql:
            splitStatements: false
            sql: |
              DROP TRIGGER IF EXISTS trg_sync_columns_to_doc ON orders;
              DROP FUNCTION IF EXISTS sync_columns_to_doc();
  - changeSet:
      id: orders-migrate-existing-data-202604101344
      author: Stephen Atwell
      comment: Migrate existing data from doc JSON column to new individual columns
      labels: myticket-123
      runInTransaction: false
      changes:
        - sql:
            splitStatements: false
            sql: |
              UPDATE orders
              SET
                  main = doc::json->>'Main',
                  drink = doc::json->>'Drink',
                  email = doc::json->>'Email',
                  side1 = doc::json->>'Side1',
                  side2 = doc::json->>'Side2',
                  orderid = (doc::json->>'OrderId')::BIGINT,
                  orderdate = (doc::json->>'OrderDate')::TIMESTAMP,
                  orderstatus = doc::json->>'OrderStatus'
              WHERE doc IS NOT NULL;
      rollback:
        - sql:
            splitStatements: false
            sql: |
              UPDATE orders
              SET
                  main = NULL,
                  drink = NULL,
                  email = NULL,
                  side1 = NULL,
                  side2 = NULL,
                  orderid = NULL,
                  orderdate = NULL,
                  orderstatus = NULL;
