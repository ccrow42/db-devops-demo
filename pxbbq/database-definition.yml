  - changeSet:
      id: orders-create-sync-trigger-function-202604101929
      author: Stephen Atwell
      comment: Create trigger function to sync JSON doc column with individual columns
      labels: myticket-123
      runOnChange: true
      splitStatements: false
      changes:
        - sql:
            sql: |
              CREATE OR REPLACE FUNCTION sync_orders_doc_columns()
              RETURNS TRIGGER AS $$
              BEGIN
                  -- When doc column is updated, sync to individual columns
                  IF TG_OP = 'INSERT' OR TG_OP = 'UPDATE' THEN
                      IF NEW.doc IS NOT NULL AND NEW.doc::text <> '' THEN
                          NEW.main := NEW.doc::json->>'Main';
                          NEW.drink := NEW.doc::json->>'Drink';
                          NEW.email := NEW.doc::json->>'Email';
                          NEW.side1 := NEW.doc::json->>'Side1';
                          NEW.side2 := NEW.doc::json->>'Side2';
                          NEW.orderid := (NEW.doc::json->>'OrderId')::BIGINT;
                          NEW.orderdate := (NEW.doc::json->>'OrderDate')::TIMESTAMP;
                          NEW.orderstatus := NEW.doc::json->>'OrderStatus';
                      END IF;
                  END IF;
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;
      rollback:
        - sql:
            sql: |
              DROP FUNCTION IF EXISTS sync_orders_doc_columns();
  - changeSet:
      id: orders-create-sync-trigger-202604101929
      author: Stephen Atwell
      comment: Create trigger to automatically sync doc column changes to individual columns
      labels: myticket-123
      splitStatements: false
      changes:
        - sql:
            sql: |
              CREATE TRIGGER trg_sync_orders_doc_columns
              BEFORE INSERT OR UPDATE ON orders
              FOR EACH ROW
              EXECUTE FUNCTION sync_orders_doc_columns();
      rollback:
        - sql:
            sql: |
              DROP TRIGGER IF EXISTS trg_sync_orders_doc_columns ON orders;
  - changeSet:
      id: orders-populate-columns-from-doc-202604101929
      author: Stephen Atwell
      comment: Populate new columns from existing doc JSON data
      labels: myticket-123
      runInTransaction: false
      splitStatements: false
      changes:
        - sql:
            sql: |
              UPDATE orders
              SET
                  main = doc::json->>'Main',
                  drink = doc::json->>'Drink',
                  email = doc::json->>'Email',
                  side1 = doc::json->>'Side1',
                  side2 = doc::json->>'Side2',
                  orderid = (doc::json->>'OrderId')::BIGINT,
                  orderdate = (doc::json->>'OrderDate')::TIMESTAMP,
                  orderstatus = doc::json->>'OrderStatus'
              WHERE doc IS NOT NULL
                AND doc::text <> '';
      rollback:
        - sql:
            sql: |
              UPDATE orders
              SET
                  main = NULL,
                  drink = NULL,
                  email = NULL,
                  side1 = NULL,
                  side2 = NULL,
                  orderid = NULL,
                  orderdate = NULL,
                  orderstatus = NULL;
