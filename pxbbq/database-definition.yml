  - changeSet:
      id: orders-create-sync-trigger-from-doc-202604101118
      author: Stephen Atwell
      comment: Create trigger to sync data from doc JSON column to individual columns
      labels: myticket-123
      runOnChange: true
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION sync_orders_from_doc()
              RETURNS TRIGGER AS $$
              BEGIN
                  NEW.main := NEW.doc::json->>'Main';
                  NEW.drink := NEW.doc::json->>'Drink';
                  NEW.email := NEW.doc::json->>'Email';
                  NEW.side1 := NEW.doc::json->>'Side1';
                  NEW.side2 := NEW.doc::json->>'Side2';
                  NEW.orderid := (NEW.doc::json->>'OrderId')::BIGINT;
                  NEW.orderdate := (NEW.doc::json->>'OrderDate')::TIMESTAMP;
                  NEW.orderstatus := NEW.doc::json->>'OrderStatus';
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              DROP TRIGGER IF EXISTS trg_sync_orders_from_doc ON orders;

              CREATE TRIGGER trg_sync_orders_from_doc
              BEFORE INSERT OR UPDATE OF doc ON orders
              FOR EACH ROW
              EXECUTE FUNCTION sync_orders_from_doc();
      rollback:
        - sql:
            splitStatements: false
            sql: |
              DROP TRIGGER IF EXISTS trg_sync_orders_from_doc ON orders;
              DROP FUNCTION IF EXISTS sync_orders_from_doc();
  - changeSet:
      id: orders-create-sync-trigger-to-doc-202604101118
      author: Stephen Atwell
      comment: Create trigger to sync data from individual columns back to doc JSON column
      labels: myticket-123
      runOnChange: true
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION sync_orders_to_doc()
              RETURNS TRIGGER AS $$
              BEGIN
                  NEW.doc := json_build_object(
                      'Main', NEW.main,
                      'Drink', NEW.drink,
                      'Email', NEW.email,
                      'Side1', NEW.side1,
                      'Side2', NEW.side2,
                      'OrderId', NEW.orderid,
                      'OrderDate', NEW.orderdate,
                      'OrderStatus', NEW.orderstatus
                  )::text;
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              DROP TRIGGER IF EXISTS trg_sync_orders_to_doc ON orders;

              CREATE TRIGGER trg_sync_orders_to_doc
              BEFORE UPDATE OF main, drink, email, side1, side2, orderid, orderdate, orderstatus ON orders
              FOR EACH ROW
              EXECUTE FUNCTION sync_orders_to_doc();
      rollback:
        - sql:
            splitStatements: false
            sql: |
              DROP TRIGGER IF EXISTS trg_sync_orders_to_doc ON orders;
              DROP FUNCTION IF EXISTS sync_orders_to_doc();
  - changeSet:
      id: orders-populate-columns-from-doc-202604101118
      author: Stephen Atwell
      comment: Batch populate new columns from existing doc JSON data
      labels: myticket-123
      runInTransaction: false
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $$
              DECLARE
                  batch_size INT := 1000;
                  rows_updated INT;
              BEGIN
                  LOOP
                      UPDATE orders
                      SET
                          main = doc::json->>'Main',
                          drink = doc::json->>'Drink',
                          email = doc::json->>'Email',
                          side1 = doc::json->>'Side1',
                          side2 = doc::json->>'Side2',
                          orderid = (doc::json->>'OrderId')::BIGINT,
                          orderdate = (doc::json->>'OrderDate')::TIMESTAMP,
                          orderstatus = doc::json->>'OrderStatus'
                      WHERE ctid IN (
                          SELECT ctid
                          FROM orders
                          WHERE main IS NULL
                             OR drink IS NULL
                             OR email IS NULL
                             OR side1 IS NULL
                             OR side2 IS NULL
                             OR orderid IS NULL
                             OR orderdate IS NULL
                             OR orderstatus IS NULL
                          LIMIT batch_size
                      );

                      GET DIAGNOSTICS rows_updated = ROW_COUNT;

                      IF rows_updated = 0 THEN
                          EXIT;
                      END IF;

                      COMMIT;
                      PERFORM pg_sleep(0.1);
                  END LOOP;
              END $$;
      rollback: []
